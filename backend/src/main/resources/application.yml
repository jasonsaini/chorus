# Copy to application.yml and set your API key:
#   cp src/main/resources/application.example.yml src/main/resources/application.yml

spring:
  application:
    name: chorus-backend
  datasource:
    url: jdbc:h2:file:${CHORUS_DATA_DIR:./data}/chorus;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-key-here}
      chat:
        options:
          model: claude-sonnet-4-20250514

server:
  port: ${PORT:8080}

chorus:
  ai:
    # always: Claude responds to every message
    # mention: Claude only when the message contains @claude
    trigger: always
  cors:
    allowed-origins: ${CHORUS_ALLOWED_ORIGINS:http://localhost:3000}
  open-api:
    # Optional: e.g. http://192.168.1.10:8080 so “Try it out” uses your LAN IP
    server-url: ${CHORUS_OPENAPI_SERVER_URL:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
