spring:
  application:
    name: chorus-backend
  datasource:
    url: jdbc:h2:file:${CHORUS_DATA_DIR:./data}/chorus;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514

server:
  port: 8080

chorus:
  ai:
    trigger: always
  cors:
    allowed-origins: ${CHORUS_ALLOWED_ORIGINS:http://localhost:3000}
  # Optional: set when serving API docs from another host (e.g. http://192.168.1.10:8080)
  open-api:
    server-url: ${CHORUS_OPENAPI_SERVER_URL:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
